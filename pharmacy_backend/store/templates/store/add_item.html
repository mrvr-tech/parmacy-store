{% extends 'base.html' %}

{% block title %}Add Item - Store Keeper{% endblock %}

{% block content %}
<h2 class="section-title">Add New Item</h2>

{% if error %}
<div class="alert" style="background-color: #f8d7da; color: #721c24; border-color: #f5c6cb; margin-bottom: 20px;">
    {{ error }}
</div>
{% endif %}

<div style="background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 600px;">
    <form method="post">
        {% csrf_token %}

        <div style="margin-bottom: 20px;">
            <label for="category" style="display: block; margin-bottom: 8px; font-weight: 500; color: #333;">Category *</label>
            <select id="category" name="category" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px;">
                <option value="">Select a category</option>
                {% for value, label in category_choices %}
                <option value="{{ value }}" {% if form_data.category == value %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>

        <div style="margin-bottom: 20px;">
            <label for="item_name" style="display: block; margin-bottom: 8px; font-weight: 500; color: #333;">Item Name *</label>
            <input type="text" id="item_name" name="item_name" placeholder="e.g., Acetone" value="{{ form_data.item_name|default:'' }}" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px;">
        </div>

        <div style="margin-bottom: 20px;">
            <label for="packages" style="display: block; margin-bottom: 8px; font-weight: 500; color: #333;">Package Size/Type (e.g., 500mg, 1L, 100 tablets)</label>
            <input type="text" id="packages" name="packages" placeholder="e.g., 500mg, 1L, 100 tablets" value="{{ form_data.packages|default:'' }}" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px;">
        </div>

        <div style="margin-bottom: 20px;">
            <label for="quantity" style="display: block; margin-bottom: 8px; font-weight: 500; color: #333;">Quantity *</label>
            <input type="number" id="quantity" name="quantity" placeholder="e.g., 20" value="{{ form_data.quantity|default:'' }}" required min="1" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px;">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
            <div>
                <label for="price" style="display: block; margin-bottom: 8px; font-weight: 500; color: #333;">Price (Rs.) *</label>
                <input type="number" id="price" name="price" placeholder="e.g., 250" value="{{ form_data.price|default:'' }}" required min="0" step="0.01" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px;">
            </div>

            <div>
                <label for="tax" style="display: block; margin-bottom: 8px; font-weight: 500; color: #333;">Tax (Rs.)</label>
                <input type="number" id="tax" name="tax" placeholder="e.g., 0" min="0" step="0.01" value="{{ form_data.tax|default:'0' }}" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px;">
            </div>
        </div>

        <div style="margin-bottom: 20px;">
            <label for="bill_no" style="display: block; margin-bottom: 8px; font-weight: 500; color: #333;">Bill No *</label>
            <input type="text" id="bill_no" name="bill_no" placeholder="e.g., B101" value="{{ form_data.bill_no|default:'' }}" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px;">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
            <div>
                <label for="date" style="display: block; margin-bottom: 8px; font-weight: 500; color: #333;">Date *</label>
                <input type="date" id="date" name="date" value="{{ form_data.date|default:'' }}" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px;">
            </div>

            <div>
                <label for="expiry_date" style="display: block; margin-bottom: 8px; font-weight: 500; color: #333;">Expiry Date *</label>
                <input type="date" id="expiry_date" name="expiry_date" value="{{ form_data.expiry_date|default:'' }}" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px;">
            </div>
        </div>

        <div style="margin-bottom: 20px;">
            <label for="vendor_name" style="display: block; margin-bottom: 8px; font-weight: 500; color: #333;">Vendor Name *</label>
            <input type="text" id="vendor_name" name="vendor_name" placeholder="e.g., ABC Chemicals" value="{{ form_data.vendor_name|default:'' }}" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px;">
        </div>

        <div style="margin-bottom: 20px;">
            <label for="vendor_address" style="display: block; margin-bottom: 8px; font-weight: 500; color: #333;">Vendor Address *</label>
            <textarea id="vendor_address" name="vendor_address" placeholder="Enter vendor address" required rows="3" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; font-family: inherit;">{{ form_data.vendor_address|default:'' }}</textarea>
        </div>

        <div style="margin-bottom: 30px;">
            <label for="vendor_pan" style="display: block; margin-bottom: 8px; font-weight: 500; color: #333;">Vendor PAN *</label>
            <input type="text" id="vendor_pan" name="vendor_pan" placeholder="e.g., AAAPA1234A" value="{{ form_data.vendor_pan|default:'' }}" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px;">
        </div>

        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn">Add Item</button>
            <a href="{% url 'manage_inventory' %}" class="btn btn-secondary">Back</a>
        </div>
    </form>
</div>

<script>
    const dateField = document.getElementById('date');
    if (dateField && !dateField.value) {
        dateField.valueAsDate = new Date();
    }
</script>
{% endblock %}
